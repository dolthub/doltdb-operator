chpasswd:
  list: |
    ubuntu:ubuntu
  expire: False

write_files:
- content: |
    sudo apt-get -y install ca-certificates curl gnupg lsb-release apt-transport-https 
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg 
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu  $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null 
    sudo curl -fsSLo /usr/share/keyrings/kubernetes-archive-keyring.gpg https://packages.cloud.google.com/apt/doc/apt-key.gpg 
    echo "deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://apt.kubernetes.io/ kubernetes-xenial main" | sudo tee /etc/apt/sources.list.d/kubernetes.list 
    sudo apt-get update 
    sudo apt install -y vim ssh net-tools docker-ce docker-ce-cli containerd.io kubectl cloud-guest-utils make gcc
    sudo groupadd docker 
    sudo usermod -aG docker ubuntu

    # Install Kubectl
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    chmod +x kubectl
    sudo mv kubectl /usr/local/bin/kubectl

    # Install Kind 
    curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
    chmod +x ./kind 
    sudo mv ./kind /usr/local/bin/kind 
    
    # Golang
    curl -Lo ./go23.tar.gz https://golang.org/dl/go1.23.2.linux-arm64.tar.gz
    sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf go23.tar.gz
    sudo echo "export PATH=$PATH:/usr/local/go/bin" >> /etc/profile
    export PATH=$PATH:/usr/local/go/bin
  path: /home/ubuntu/install.sh

- content: |
    alias kgp='kubectl get pod -o wide'
    alias kgs='kubectl get svc -o wide'
    alias kgd='kubectl get deploy -o wide'
    alias kgc='kubectl get cm -A -o wide'
    alias kgpa='kubectl get pod -A -o wide'
    alias kgsa='kubectl get svc -A -o wide'
    alias kgda='kubectl get deploy -A -o wide'
    alias kgca='kubectl get cm -A -o wide'
    alias kgn='kubectl get node -o wide'
    alias 'kc=kubectl' 
  path: /home/ubuntu/.bashrc
  append: true

runcmd:
  - sudo chown ubuntu:ubuntu /home/ubuntu
  - sudo chmod +x /home/ubuntu/install.sh
  - /home/ubuntu/install.sh
  - mkdir /home/ubuntu/go
  - mkdir /home/ubuntu/go/src
  - sudo echo "export GOPATH=/home/ubuntu/go" >> /home/ubuntu/.bashrc
  - sudo chown ubuntu:ubuntu -R /home/ubuntu
