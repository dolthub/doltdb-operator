apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-container
  labels:
    app: test-container
spec:
  replicas: 1  # Number of replicas
  selector:
    matchLabels:
      app: test-container
  template:
    metadata:
      labels:
        app: test-container
    spec:
      containers:
        - name: test-container
          image: localhost:5000/test-container
