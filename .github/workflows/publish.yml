name: Publish Helm Charts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (MAJOR.MINOR.PATCH)"
        required: true
        type: string
      latest:
        description: "Tag artifacts as latest"
        required: false
        type: boolean
        default: false
      promote:
        description: "Promote the release after publishing"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  REGISTRY: public.ecr.aws/dolthub
  IMAGE_NAME: doltdb-operator-image

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.release.tag_name || format('v{0}', inputs.version) }}

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            IS_LATEST="${{ inputs.latest }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            IS_LATEST="true"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_latest=${IS_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin public.ecr.aws
          aws ecr-public get-login-password --region us-east-1 | \
            helm registry login --username AWS --password-stdin public.ecr.aws

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.is_latest == 'true' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Update chart image reference
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|repository: .*|repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|" charts/doltdb-operator/values.yaml
          sed -i "s|tag: .*|tag: \"${VERSION}\"|" charts/doltdb-operator/values.yaml

      - name: Package and push Helm charts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_LATEST="${{ steps.version.outputs.is_latest }}"

          helm package charts/doltdb-operator-crds --version "$VERSION" --app-version "$VERSION"
          helm package charts/doltdb-operator --version "$VERSION" --app-version "$VERSION"

          helm push "doltdb-operator-crds-${VERSION}.tgz" "oci://${{ env.REGISTRY }}"
          helm push "doltdb-operator-${VERSION}.tgz" "oci://${{ env.REGISTRY }}"

          if [ "$IS_LATEST" = "true" ]; then
            helm package charts/doltdb-operator-crds --version "latest" --app-version "$VERSION"
            helm package charts/doltdb-operator --version "latest" --app-version "$VERSION"

            helm push "doltdb-operator-crds-latest.tgz" "oci://${{ env.REGISTRY }}"
            helm push "doltdb-operator-latest.tgz" "oci://${{ env.REGISTRY }}"
          fi

  promote:
    name: Promote Release
    needs: release
    if: github.event_name == 'release' || inputs.promote
    uses: ./.github/workflows/promote.yml
    with:
      tag_name: ${{ github.event.release.tag_name || format('v{0}', inputs.version) }}
    secrets: inherit
