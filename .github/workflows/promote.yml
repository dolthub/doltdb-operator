name: Promote Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to promote (e.g. v0.1.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to promote (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    name: Promote Pre-release
    runs-on: ubuntu-latest
    steps:
      - name: Promote to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ inputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --prerelease=false \
            --latest
