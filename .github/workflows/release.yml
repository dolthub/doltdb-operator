name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (MAJOR.MINOR.PATCH)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in MAJOR.MINOR.PATCH format (e.g. 0.2.0)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main

      - name: Verify on main branch
        run: |
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::Releases must be created from the main branch"
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.7
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
        run: |
          INSTALL_NOTES="$(cat <<EOF
          ## Installation

          \`\`\`bash
          # Install CRDs
          helm install doltdb-operator-crds oci://public.ecr.aws/dolthub/doltdb-operator-crds --version ${VERSION}

          # Install operator
          helm install doltdb-operator oci://public.ecr.aws/dolthub/doltdb-operator --version ${VERSION}
          \`\`\`
          EOF
          )"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes-start-tag "" \
            --prerelease \
            --latest=false

          GENERATED_NOTES="$(gh release view "v${VERSION}" --json body -q .body)"
          gh release edit "v${VERSION}" --notes "${GENERATED_NOTES}

          ${INSTALL_NOTES}"
