apiVersion: k8s.dolthub.com/v1alpha
kind: DoltDB
metadata:
  name: dolt
  namespace: default
spec:
  engineVersion: 1.52.0
  image: "dolthub/dolt"
  replicas: 2
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
  storage:
    size: "10Gi"
    storageClassName: "dolt-sc"
  server:
    listener:
      maxConnections: 1024
    metrics:
      enabled: true
      labels:
        app: dolt
  replication:
    enabled: true
    primary: 
      podIndex: 0
      automaticFailover: true